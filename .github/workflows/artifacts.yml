name: engine-artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "engine-*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison flex zlib1g-dev

      - name: Build libpglite
        run: ./native/build-libpglite.sh

      - name: Package artifact
        run: |
          cd native/out
          cp ../pglite_native.h .
          tar czf "pglite-${{ matrix.target }}.tar.gz" libpglite.a pglite-runtime.tar pglite_native.h
          shasum -a 256 "pglite-${{ matrix.target }}.tar.gz" | awk '{print $1}' > "pglite-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/engine-')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            native/out/pglite-${{ matrix.target }}.tar.gz
            native/out/pglite-${{ matrix.target }}.tar.gz.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pglite-${{ matrix.target }}
          path: native/out/pglite-${{ matrix.target }}.tar.gz
