name: engine-artifacts

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "engine-*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison flex zlib1g-dev libssl-dev patchelf libicu-dev pkg-config

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install icu4c pkgconf openssl@3 || true

      - name: Build libpglite
        run: ./native/build-libpglite.sh

      - name: Relocate base runtime
        run: ./native/relocate-runtime.sh native/out

      - name: Build extensions
        run: ./native/build-extensions.sh pgcrypto pgvector
        env:
          TARGET: ${{ matrix.target }}

      - name: Build ICU variant
        run: WITH_ICU=1 ./native/build-libpglite.sh

      - name: Relocate ICU runtime
        run: ./native/relocate-runtime.sh native/out/icu

      - name: Package artifacts
        run: |
          cd native/out
          cp ../pglite_native.h .
          tar czf "pglite-${{ matrix.target }}.tar.gz" libpglite.a pglite-runtime.tar pglite_native.h
          (cd icu && cp ../../pglite_native.h . && tar czf "../pglite-icu-${{ matrix.target }}.tar.gz" libpglite.a pglite-runtime.tar pglite_native.h)
          for f in pglite-${{ matrix.target }}.tar.gz pglite-icu-${{ matrix.target }}.tar.gz pglite-ext-*-${{ matrix.target }}.tar.gz; do
            shasum -a 256 "$f" | awk '{print $1}' > "$f.sha256"
          done

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/engine-')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            native/out/pglite-${{ matrix.target }}.tar.gz
            native/out/pglite-${{ matrix.target }}.tar.gz.sha256
            native/out/pglite-icu-${{ matrix.target }}.tar.gz
            native/out/pglite-icu-${{ matrix.target }}.tar.gz.sha256
            native/out/pglite-ext-*-${{ matrix.target }}.tar.gz
            native/out/pglite-ext-*-${{ matrix.target }}.tar.gz.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pglite-${{ matrix.target }}
          path: |
            native/out/pglite-*.tar.gz
            native/out/pglite-ext-*.tar.gz
