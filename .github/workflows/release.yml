name: release

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-2022
            target: x86_64-pc-windows-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Force LF checkout (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison flex zlib1g-dev libssl-dev

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pkgconf openssl@3 || true

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          pacboy: toolchain:p zlib:p clang:p libunwind:p
          install: bison flex make perl git diffutils zstd

      - name: Cache engine build
        uses: actions/cache@v4
        with:
          path: native/out
          key: engine-${{ matrix.target }}-${{ hashFiles('native/build-libpglite.sh', 'native/pglite_native.c', 'native/pglite_native.h', 'native/pglite_reset.c', 'native/patches/*', '.gitmodules') }}

      - name: Build libpglite (Unix)
        if: runner.os != 'Windows'
        run: ./native/build-libpglite.sh

      - name: Build libpglite (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: CC=gcc ./native/build-libpglite.sh

      - name: Build extensions (Unix)
        if: runner.os != 'Windows'
        run: ./native/build-extensions.sh pgcrypto pgvector
        env:
          TARGET: ${{ matrix.target }}

      - name: Tests (Unix)
        if: runner.os != 'Windows'
        run: cargo test --workspace

      - name: Tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        timeout-minutes: 20
        run: |
          rustup target add x86_64-pc-windows-gnullvm
          export CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_LINKER=clang
          cargo test -p pglite-rs -p pglite-rs-sys --target x86_64-pc-windows-gnullvm

      - name: Stage + verify lib-crate payload (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p stage
          zstd -19 -q -o stage/libpglite.a.zst native/out/libpglite.a
          zstd -19 -q -o stage/pglite-runtime.tar.zst native/out/pglite-runtime.tar
          cp native/out/pglite-ext-*-${{ matrix.target }}.tar.gz stage/
          ls -l stage/
          # Exercise the published-crate path: build against only the .zst payload
          libdir="$RUNNER_TEMP/pglite-zst"
          mkdir -p "$libdir"
          cp stage/libpglite.a.zst stage/pglite-runtime.tar.zst "$libdir/"
          PGLITE_LIB_DIR="$libdir" cargo build -p pglite-rs --tests

      - name: Stage lib-crate payload (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p stage
          zstd -19 -q -o stage/libpglite.a.zst native/out/libpglite.a
          zstd -19 -q -o stage/pglite-runtime.tar.zst native/out/pglite-runtime.tar
          ls -l stage/

      - uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.target }}
          path: stage/

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: lib-*
          path: staged

      - name: Stage payloads into lib crates
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu; do
            mkdir -p "crates/lib-$target/lib"
            cp staged/lib-$target/* "crates/lib-$target/lib/"
          done

      - name: Publish lib crates
        run: |
          ver=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu; do
            name="pglite-rs-lib-$target"
            if cargo search "$name" 2>/dev/null | grep -q "^$name = \"$ver\""; then
              echo "$name $ver already on crates.io, skipping"
              continue
            fi
            cargo publish -p "$name" --allow-dirty --no-verify
          done

      - name: Publish pglite-rs-sys
        run: |
          ver=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if cargo search pglite-rs-sys 2>/dev/null | grep -q "^pglite-rs-sys = \"$ver\""; then
            echo "pglite-rs-sys $ver already on crates.io, skipping"; exit 0
          fi
          for i in $(seq 1 10); do
            cargo publish -p pglite-rs-sys --no-verify && break
            sleep 30
          done

      - name: Publish pglite-rs
        run: |
          ver=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if cargo search pglite-rs 2>/dev/null | grep -q "^pglite-rs = \"$ver\""; then
            echo "pglite-rs $ver already on crates.io, skipping"; exit 0
          fi
          for i in $(seq 1 10); do
            cargo publish -p pglite-rs --no-verify && break
            sleep 30
          done
