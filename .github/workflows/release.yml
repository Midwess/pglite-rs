name: release

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-2022
            target: x86_64-pc-windows-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Force LF checkout (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison flex zlib1g-dev libssl-dev patchelf

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pkgconf openssl@3 || true

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          pacboy: toolchain:p zlib:p clang:p libunwind:p
          install: bison flex make perl git diffutils zstd

      - name: Cache engine build
        uses: actions/cache@v4
        with:
          path: native/out
          key: engine-${{ matrix.target }}-${{ hashFiles('native/build-libpglite.sh', 'native/pglite_native.c', 'native/pglite_native.h', 'native/pglite_reset.c', 'native/patches/*', '.gitmodules') }}

      - name: Build libpglite (Unix)
        if: runner.os != 'Windows'
        run: ./native/build-libpglite.sh

      - name: Build libpglite (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: CC=gcc ./native/build-libpglite.sh

      - name: Relocate + verify runtime libs (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PREFIX=native/out/install
          OUT=native/out
          if [ "$(uname)" = "Darwin" ]; then
            install_name_tool -id "@rpath/libpq.5.dylib" "$PREFIX/lib/libpq.5.dylib"
            for spec in "bin/initdb:@loader_path/../lib/libpq.5.dylib" "lib/postgresql/libpqwalreceiver.dylib:@loader_path/../libpq.5.dylib"; do
              f="${spec%%:*}"; new="${spec##*:}"
              cur="$(otool -L "$PREFIX/$f" | awk '/libpq\.5\.dylib/{print $1; exit}')"
              [ -n "$cur" ] && install_name_tool -change "$cur" "$new" "$PREFIX/$f"
            done
            codesign -f -s - "$PREFIX/lib/libpq.5.dylib" "$PREFIX/bin/initdb" "$PREFIX/lib/postgresql/libpqwalreceiver.dylib"
            LIBS="lib/libpq.5.dylib"
          else
            patchelf --set-rpath '$ORIGIN/../lib:$ORIGIN/..' "$PREFIX/bin/initdb" "$PREFIX/bin/postgres" "$PREFIX/lib/postgresql/libpqwalreceiver.so"
            LIBS="$(cd "$PREFIX" && ls lib/libpq.so* | tr '\n' ' ')"
          fi
          tar -C "$PREFIX" --exclude lib/postgresql/pgxs -cf "$OUT/pglite-runtime.tar" \
            share/postgresql lib/postgresql bin/initdb bin/postgres $LIBS
          V="$(mktemp -d)"; tar -C "$V" -xf "$OUT/pglite-runtime.tar"; "$V/bin/initdb" --version

      - name: Relocate + verify runtime libs (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          PREFIX=native/out/install
          OUT=native/out
          for f in "$PREFIX/bin/initdb.exe" "$PREFIX/bin/postgres.exe" "$PREFIX/lib/postgresql/libpqwalreceiver.dll"; do
            [ -f "$f" ] || continue
            deps="$(ldd "$f" 2>/dev/null | awk '{print $3}' | grep -iE '/(ucrt64|mingw64|clang64)/' || true)"
            for dll in $deps; do [ -f "$dll" ] && cp -n "$dll" "$PREFIX/bin/"; done
          done
          DLLS="$(cd "$PREFIX" && ls bin/*.dll | tr '\n' ' ')"
          tar -C "$PREFIX" --exclude lib/postgresql/pgxs -cf "$OUT/pglite-runtime.tar" \
            share/postgresql lib/postgresql bin/initdb.exe bin/postgres.exe $DLLS
          V="$(mktemp -d)"; tar -C "$V" -xf "$OUT/pglite-runtime.tar"; "$V/bin/initdb.exe" --version

      - name: Build extensions (Unix)
        if: runner.os != 'Windows'
        run: ./native/build-extensions.sh pgcrypto pgvector
        env:
          TARGET: ${{ matrix.target }}

      - name: Tests (Unix)
        if: runner.os != 'Windows'
        run: cargo test --workspace

      - name: Tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        timeout-minutes: 20
        run: |
          rustup target add x86_64-pc-windows-gnullvm
          export CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_LINKER=clang
          cargo test -p pglite-rs -p pglite-rs-sys --target x86_64-pc-windows-gnullvm

      - name: Stage + verify lib-crate payload (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p stage
          zstd -19 -q -o stage/libpglite.a.zst native/out/libpglite.a
          zstd -19 -q -o stage/pglite-runtime.tar.zst native/out/pglite-runtime.tar
          cp native/out/pglite-ext-*-${{ matrix.target }}.tar.gz stage/
          ls -l stage/
          # Exercise the published-crate path: build against only the .zst payload
          libdir="$RUNNER_TEMP/pglite-zst"
          mkdir -p "$libdir"
          cp stage/libpglite.a.zst stage/pglite-runtime.tar.zst "$libdir/"
          PGLITE_LIB_DIR="$libdir" cargo build -p pglite-rs --tests

      - name: Stage lib-crate payload (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p stage
          zstd -19 -q -o stage/libpglite.a.zst native/out/libpglite.a
          zstd -19 -q -o stage/pglite-runtime.tar.zst native/out/pglite-runtime.tar
          ls -l stage/

      - uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.target }}
          path: stage/

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: lib-*
          path: staged

      - name: Stage payloads into lib crates
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu; do
            mkdir -p "crates/lib-$target/lib"
            cp staged/lib-$target/* "crates/lib-$target/lib/"
          done

      - name: Publish crates to crates.io
        run: |
          ver=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          # Idempotent + tolerant of crates.io's new-crate rate limit (429) and
          # sparse-index propagation delay between dependent crates. Retries with
          # a long backoff and fails the step if a crate never lands.
          publish() {
            local pkg="$1"; shift
            if cargo search "$pkg" 2>/dev/null | grep -q "^$pkg = \"$ver\""; then
              echo "::notice::$pkg $ver already on crates.io, skipping"
              return 0
            fi
            local i
            for i in $(seq 1 30); do
              if cargo publish -p "$pkg" "$@"; then
                echo "::notice::published $pkg $ver"
                return 0
              fi
              echo "::warning::publish $pkg attempt $i failed (rate limit or index propagation); retrying in 60s"
              sleep 60
            done
            echo "::error::failed to publish $pkg $ver after retries"
            return 1
          }
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu; do
            publish "pglite-rs-lib-$target" --allow-dirty --no-verify
          done
          publish pglite-rs-sys --no-verify
          publish pglite-rs --no-verify
